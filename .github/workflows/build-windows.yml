name: Build RustDesk Windows Client

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout rustdesk
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository }}
        path: rustdesk
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Checkout custom hbb_common
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository_owner }}/hbb_common
        path: rustdesk/libs/hbb_common
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat
        echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "C:\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        
    - name: Install required libraries with vcpkg
      run: |
        vcpkg install opus
        
    - name: Setup Rust
      run: |
        rustup target add x86_64-pc-windows-msvc
        rustup component add rust-src
        
    - name: Build
      run: |
        cd rustdesk
        cargo build --release --target x86_64-pc-windows-msvc
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-exe
        path: rustdesk/target/x86_64-pc-windows-msvc/release/rustdesk.exe
