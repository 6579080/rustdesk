name: Build Windows Client

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout rustdesk
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository }}
        path: rustdesk
        
    - name: Checkout custom hbb_common
      uses: actions/checkout@v4
      with:
        repository: 6579080/hbb_common
        path: rustdesk/libs/hbb_common
        
    - name: Setup Rust
      run: |
        rustup target add x86_64-pc-windows-msvc
        rustup component add rust-src
        
    - name: Build
      run: |
        cd rustdesk
        cargo build --release --target x86_64-pc-windows-msvc
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-exe
        path: rustdesk/target/x86_64-pc-windows-msvc/release/rustdesk.exe
        
    - name: Upload DLLs and resources
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-full
        path: rustdesk/target/x86_64-pc-windows-msvc/release/
